<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Help Desk</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tab-btn {
            background: none;
            border: none;
            padding: 1rem 2rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">HELP DESK ADMIN</div>
        <nav>
            <span id="userName" style="font-weight: 500; margin-right: 1rem;"></span>
            <a onclick="logout()" class="logout-btn">Sair</a>
        </nav>
    </header>

    <main class="container">
        <div class="flex mb-4" style="border-bottom: 1px solid var(--border);">
            <button class="tab-btn active" onclick="switchTab('tickets')">Chamados</button>
            <button class="tab-btn" onclick="switchTab('users')">Usuários</button>
        </div>

        <!-- Seção de Chamados -->
        <section id="ticketsTab">
            <div class="flex justify-between items-center mb-4">
                <h1>Todos os Chamados</h1>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Usuário</th>
                            <th>Título</th>
                            <th>Prioridade</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="adminTicketsList">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Seção de Usuários -->
        <section id="usersTab" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h1>Gerenciar Usuários</h1>
                <button class="btn btn-primary" onclick="toggleModal('userModal', true)">Novo Usuário</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Perfil</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usersList">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Novo Usuário -->
    <div id="userModal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100;">
        <div class="card" style="width: 100%; max-width: 400px; margin: 0 1rem;">
            <h2>Cadastrar Usuário</h2>
            <form id="userForm">
                <div class="form-group">
                    <label for="newName">Nome Completo</label>
                    <input type="text" id="newName" required>
                </div>
                <div class="form-group">
                    <label for="newEmail">E-mail</label>
                    <input type="email" id="newEmail" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">Senha</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label for="newRole">Perfil</label>
                    <select id="newRole">
                        <option value="user">Usuário Comum</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="flex" style="gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="toggleModal('userModal', false)">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Status Chamado -->
    <div id="statusModal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100;">
        <div class="card" style="width: 100%; max-width: 400px; margin: 0 1rem;">
            <h2>Atualizar Status</h2>
            <p id="ticketInfo" class="mb-4" style="color: var(--text-muted)"></p>
            <div class="form-group">
                <label for="newStatus">Novo Status</label>
                <select id="newStatus">
                    <option value="aberto">Aberto</option>
                    <option value="em_andamento">Em Andamento</option>
                    <option value="resolvido">Resolvido</option>
                    <option value="fechado">Fechado</option>
                </select>
            </div>
            <div class="flex" style="gap: 1rem; justify-content: flex-end;">
                <input type="hidden" id="currentTicketId">
                <button type="button" class="btn" onclick="toggleModal('statusModal', false)">Cancelar</button>
                <button class="btn btn-primary" onclick="confirmStatusUpdate()">Salvar</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (user && user.role === 'admin') {
                document.getElementById('userName').textContent = `Admin: ${user.name}`;
                loadAdminTickets();
                loadUsers();
            } else {
                window.location.href = 'dashboard.html';
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('ticketsTab').classList.add('hidden');
            document.getElementById('usersTab').classList.add('hidden');

            if (tab === 'tickets') {
                document.querySelector('[onclick="switchTab(\'tickets\')"]').classList.add('active');
                document.getElementById('ticketsTab').classList.remove('hidden');
                loadAdminTickets();
            } else {
                document.querySelector('[onclick="switchTab(\'users\')"]').classList.add('active');
                document.getElementById('usersTab').classList.remove('hidden');
                loadUsers();
            }
        }

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.remove('hidden');
                modal.style.display = 'flex';
            } else {
                modal.classList.add('hidden');
                modal.style.display = 'none';
            }
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                name: document.getElementById('newName').value,
                email: document.getElementById('newEmail').value,
                password: document.getElementById('newPassword').value,
                role: document.getElementById('newRole').value
            };

            const success = await createUser(userData);
            if (success) {
                toggleModal('userModal', false);
                document.getElementById('userForm').reset();
                loadUsers();
            }
        });
    </script>
</body>
</html>
