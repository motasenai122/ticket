<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Help Desk</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">HELP DESK</div>
        <nav>
            <span id="userName" style="font-weight: 500; margin-right: 1rem;"></span>
            <a onclick="logout()" class="logout-btn">Sair</a>
        </nav>
    </header>

    <main class="container">
        <div class="flex justify-between items-center mb-4">
            <h1>Meus Chamados</h1>
            <button class="btn btn-primary" onclick="toggleModal('ticketModal', true)">Novo Chamado</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Categoria</th>
                        <th>Prioridade</th>
                        <th>Status</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="ticketsList">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Novo Chamado -->
    <div id="ticketModal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100;">
        <div class="card" style="width: 100%; max-width: 500px; margin: 0 1rem;">
            <h2>Abrir Chamado</h2>
            <form id="ticketForm">
                <div class="form-group">
                    <label for="title">Título</label>
                    <input type="text" id="title" required>
                </div>
                <div class="flex" style="gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="category">Categoria</label>
                        <select id="category">
                            <option value="TI">TI</option>
                            <option value="RH">RH</option>
                            <option value="Financeiro">Financeiro</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="priority">Prioridade</label>
                        <select id="priority">
                            <option value="baixa">Baixa</option>
                            <option value="media">Média</option>
                            <option value="alta">Alta</option>
                            <option value="urgente">Urgente</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Descrição</label>
                    <textarea id="description" rows="4" required></textarea>
                </div>
                <div class="flex" style="gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="toggleModal('ticketModal', false)">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Detalhes -->
    <div id="detailModal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100;">
        <div class="card" style="width: 100%; max-width: 600px; margin: 0 1rem;">
            <h2 id="detailTitle">Detalhes do Chamado</h2>
            <div id="detailContent" style="margin: 1.5rem 0;"></div>
            <div class="flex" style="justify-content: flex-end;">
                <button class="btn btn-primary" onclick="toggleModal('detailModal', false)">Fechar</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/tickets.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (user) {
                document.getElementById('userName').textContent = `Olá, ${user.name}`;
                loadTickets();
            }
        });

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.remove('hidden');
                modal.style.display = 'flex';
            } else {
                modal.classList.add('hidden');
                modal.style.display = 'none';
            }
        }

        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ticket = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                priority: document.getElementById('priority').value,
                description: document.getElementById('description').value
            };

            const success = await createTicket(ticket);
            if (success) {
                toggleModal('ticketModal', false);
                document.getElementById('ticketForm').reset();
                loadTickets();
            }
        });
    </script>
</body>
</html>
